<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Worker Studio</title>
    <!-- PWA用 マニフェストとテーマカラー -->
    <meta name="theme-color" content="#f1f5f9">
    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22AI%20Worker%20Studio%22%2C%22short_name%22%3A%22AWS%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f1f5f9%22%2C%22theme_color%22%3A%22%23f1f5f9%22%7D">
    
    <!-- 外部ライブラリ (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        dark: '#0f172a'
                    }
                }
            }
        }
    </script>
    <style>
        /* エディタをコンテナサイズに追従させる */
        #editor { position: absolute; top: 0; right: 0; bottom: 0; left: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: flex; }
        /* モバイル用のタップハイライト抑止 */
        * { -webkit-tap-highlight-color: transparent; }
        /* 安全領域(ノッチ等)対応 */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col md:flex-row overflow-hidden font-sans text-sm md:text-base text-gray-800">

    <!-- 【モバイル専用】トップヘッダー (スマート化) -->
    <header class="md:hidden flex justify-between items-center bg-white/90 backdrop-blur-md text-gray-800 p-3 pt-safe border-b border-slate-200 shadow-sm z-20 shrink-0">
        <div class="font-extrabold text-lg truncate flex items-center gap-1.5">
            <span class="text-xl">⚡️</span> 
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-indigo-600">AWS</span>
        </div>
        <div class="flex gap-2 shrink-0">
            <button onclick="saveProject()" class="p-2.5 bg-slate-50 hover:bg-slate-100 border border-slate-100 rounded-full text-base transition-all active:scale-95 shadow-sm text-blue-600" title="保存">💾</button>
            <button onclick="exportProject()" class="p-2.5 bg-slate-50 hover:bg-slate-100 border border-slate-100 rounded-full text-base transition-all active:scale-95 shadow-sm text-green-600" title="エクスポート">📦</button>
            <label class="p-2.5 bg-slate-50 hover:bg-slate-100 border border-slate-100 rounded-full cursor-pointer text-base transition-all active:scale-95 shadow-sm text-yellow-600 flex items-center" title="インポート">
                📂<input type="file" class="hidden" accept=".zip" onchange="importProject(event)">
            </label>
        </div>
    </header>

    <!-- 【PC専用】サイドバー (ダークトーンで洗練) -->
    <aside class="hidden md:flex w-64 bg-dark text-slate-300 flex-col z-20 shadow-2xl shrink-0">
        <div class="p-6 text-xl font-extrabold border-b border-slate-800/80 flex items-center gap-2">
            <span class="text-blue-400 drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]">⚡️</span> 
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-200">AI Worker Studio</span>
        </div>
        <nav class="flex-1 p-3 space-y-1.5 mt-2">
            <button onclick="switchTab('chat')" class="w-full text-left p-3.5 rounded-xl hover:bg-slate-800/80 hover:text-white font-medium nav-btn-pc transition-all duration-300 flex items-center gap-3 border-l-4 border-transparent" id="nav-chat"><span>💬</span> 要件定義</button>
            <button onclick="switchTab('code')" class="w-full text-left p-3.5 rounded-xl hover:bg-slate-800/80 hover:text-white font-medium nav-btn-pc transition-all duration-300 flex items-center gap-3 border-l-4 border-transparent" id="nav-code"><span>💻</span> コード編集</button>
            <button onclick="switchTab('deploy')" class="w-full text-left p-3.5 rounded-xl hover:bg-slate-800/80 hover:text-white font-medium nav-btn-pc transition-all duration-300 flex items-center gap-3 border-l-4 border-transparent" id="nav-deploy"><span>🚀</span> デプロイ</button>
            <button onclick="switchTab('settings')" class="w-full text-left p-3.5 rounded-xl hover:bg-slate-800/80 hover:text-white font-medium nav-btn-pc transition-all duration-300 flex items-center gap-3 border-l-4 border-transparent" id="nav-settings"><span>⚙️</span> 設定</button>
        </nav>
        <div class="p-5 border-t border-slate-800/80 space-y-3 text-sm bg-slate-900/40 relative overflow-hidden">
            <button onclick="saveProject()" class="w-full bg-slate-800 hover:bg-blue-600 border border-slate-700 hover:border-blue-500 text-slate-300 hover:text-white p-3 rounded-xl text-center transition-all duration-300 shadow-md flex items-center justify-center gap-2 font-medium active:scale-95">💾 一時保存</button>
            <div class="flex gap-2">
                <button onclick="exportProject()" class="flex-1 bg-slate-800 hover:bg-green-600 border border-slate-700 hover:border-green-500 text-slate-300 hover:text-white p-3 rounded-xl text-center transition-all duration-300 shadow-md font-medium active:scale-95">📦 出力</button>
                <label class="flex-1 bg-slate-800 hover:bg-yellow-600 border border-slate-700 hover:border-yellow-500 text-slate-300 hover:text-white p-3 rounded-xl text-center cursor-pointer transition-all duration-300 shadow-md font-medium active:scale-95">
                    📂 読込
                    <input type="file" class="hidden" accept=".zip" onchange="importProject(event)">
                </label>
            </div>
            <div class="save-status-text text-xs text-slate-500 text-center mt-2 font-mono">未保存</div>
        </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="flex-1 flex flex-col relative overflow-hidden mb-[64px] md:mb-0 pb-safe md:pb-0">
        
        <!-- ローディングオーバーレイ -->
        <div id="loading-overlay" class="hidden absolute inset-0 bg-slate-900/30 z-50 flex-col items-center justify-center text-white backdrop-blur-md transition-all duration-300">
            <div class="bg-white/95 p-8 rounded-3xl shadow-2xl flex flex-col items-center border border-white/20">
                <div class="animate-spin rounded-full h-14 w-14 border-4 border-slate-100 border-t-primary mb-5 shadow-sm"></div>
                <div id="loading-text" class="text-lg font-extrabold text-slate-700 tracking-wide">処理中...</div>
            </div>
        </div>

        <!-- タブ: チャット (要件定義) -->
        <div id="tab-chat" class="tab-content active flex-col h-full p-3 md:p-8 relative max-w-5xl mx-auto w-full">
            <div class="flex justify-between items-center mb-4 shrink-0">
                <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-tight">要件定義</h2>
                <div class="flex items-center gap-3">
                    <div class="relative shadow-sm rounded-xl">
                        <select id="ai-model" class="appearance-none border border-slate-200 py-2.5 pl-4 pr-10 rounded-xl text-sm font-medium bg-white focus:ring-4 focus:ring-primary/20 outline-none cursor-pointer transition-all hover:border-primary/50 text-slate-700">
                            <option value="gemini">Gemini 2.5 Flash</option>
                            <option value="claude">Claude 3.5 Sonnet</option>
                            <option value="gpt">GPT-3.5 Turbo</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                    <button onclick="clearChat()" class="text-slate-400 hover:text-red-500 hover:bg-red-50 p-2.5 rounded-xl transition-all" title="会話をクリア">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            </div>
            
            <div id="chat-history" class="flex-1 bg-transparent border-none rounded-none p-2 mb-2 overflow-y-auto flex flex-col gap-5 pb-6 scroll-smooth">
                <!-- Javascriptで描画 -->
            </div>
            
            <!-- 対話型要件定義 UI (リッチ化) -->
            <div class="mt-auto flex flex-col gap-3 w-full shrink-0 sticky bottom-0 z-10 pt-2 pb-2 bg-gradient-to-t from-slate-100 via-slate-100 to-transparent">
                <div class="flex gap-2 w-full relative group shadow-lg shadow-slate-200/50 rounded-2xl">
                    <textarea id="chat-input" class="flex-1 border border-slate-200 p-4 pr-16 rounded-2xl resize-none text-base focus:border-primary focus:ring-4 focus:ring-primary/20 outline-none transition-all duration-300 bg-white" rows="2" placeholder="作りたいアプリのアイデアを入力..."></textarea>
                    <button onclick="sendChatMessage()" class="absolute right-2.5 bottom-2.5 bg-gradient-to-br from-primary to-blue-600 text-white p-3 rounded-xl hover:from-blue-600 hover:to-blue-700 font-bold shadow-md shadow-blue-500/30 transition-all duration-300 active:scale-95 shrink-0 flex items-center justify-center h-11 w-11" title="送信">
                        <svg class="w-5 h-5 ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19V6m0 0l-7 7m7-7l7 7"></path></svg>
                    </button>
                </div>
                <button onclick="generateCodeFromChat()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white p-4 rounded-2xl hover:from-teal-500 hover:to-teal-600 font-extrabold shadow-xl shadow-emerald-500/20 transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-2 text-lg">
                    <span class="text-2xl drop-shadow-md">⚡️</span> 要件からコードを生成する
                </button>
            </div>
        </div>

        <!-- タブ: コード (編集) -->
        <div id="tab-code" class="tab-content flex-col md:flex-row h-full relative">
            <!-- 【モバイル】ファイル一覧トグルボタン -->
            <div class="md:hidden flex justify-between items-center bg-white p-3.5 border-b border-slate-200 shadow-sm shrink-0 z-10">
                <div class="flex items-center gap-2 truncate">
                    <span class="text-xl">📄</span>
                    <span class="font-extrabold text-slate-800 truncate tracking-tight" id="mobile-current-file">ファイル未選択</span>
                </div>
                <button onclick="toggleMobileFileList()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3.5 py-2 rounded-xl shadow-sm text-sm font-bold transition-all flex items-center gap-1.5 active:scale-95">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg> ファイル
                </button>
            </div>

            <!-- ファイル一覧パネル -->
            <div id="file-list-container" class="hidden md:flex flex-col w-full md:w-64 border-r border-slate-200 bg-white absolute md:relative z-20 inset-0 md:inset-auto shadow-2xl md:shadow-none transition-all duration-300">
                <div class="p-5 font-extrabold border-b border-slate-100 bg-slate-50/50 flex justify-between items-center shrink-0">
                    <span class="text-slate-700 tracking-wide">エクスプローラー</span>
                    <button onclick="toggleMobileFileList()" class="md:hidden text-slate-400 hover:text-slate-600 hover:bg-slate-200 p-1.5 rounded-lg transition-all">&times;</button>
                </div>
                <ul id="file-list" class="flex-1 overflow-y-auto py-3 px-2 space-y-1"></ul>
            </div>
            
            <div class="flex-1 relative w-full h-full bg-[#272822]">
                <div id="editor"></div>
            </div>
        </div>

        <!-- タブ: デプロイ -->
        <div id="tab-deploy" class="tab-content flex-col h-full p-4 md:p-8 overflow-y-auto max-w-4xl mx-auto w-full">
            <h2 class="text-2xl md:text-3xl font-extrabold mb-6 text-slate-800 tracking-tight">🚀 デプロイ</h2>
            <div class="space-y-6">
                <div class="bg-white p-6 md:p-8 rounded-2xl shadow-md border border-slate-100 transition-all hover:shadow-lg">
                    <label class="block font-bold mb-2.5 text-slate-700 text-base">Worker名 <span class="text-slate-400 font-normal text-sm ml-1">(URLのプレフィックス)</span></label>
                    <input type="text" id="worker-name" class="w-full border border-slate-200 bg-slate-50/50 p-4 rounded-xl text-base focus:ring-4 focus:ring-primary/20 focus:border-primary focus:bg-white outline-none transition-all font-mono" placeholder="my-awesome-app">
                    <p class="text-sm text-slate-500 mt-3 flex items-center gap-1.5"><svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 既存の名前を入力すると上書きデプロイされます。</p>
                </div>
                
                <button onclick="deployToCloudflare()" class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white p-4.5 rounded-2xl font-extrabold hover:from-red-500 hover:to-red-600 text-lg shadow-xl shadow-red-500/20 transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-2 h-16">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg> Cloudflareへデプロイ
                </button>
                
                <div class="bg-slate-900 rounded-2xl p-1 shadow-2xl relative overflow-hidden mt-8 border border-slate-800">
                    <div class="absolute top-0 left-0 right-0 px-4 py-2.5 bg-slate-800/80 backdrop-blur-sm border-b border-slate-700 text-xs text-slate-400 font-mono flex items-center gap-2">
                        <div class="flex gap-1.5">
                            <div class="w-3 h-3 rounded-full bg-red-500/80"></div><div class="w-3 h-3 rounded-full bg-yellow-500/80"></div><div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                        </div>
                        <span class="ml-2 font-semibold tracking-wider opacity-80">Terminal</span>
                    </div>
                    <div id="deploy-log" class="mt-10 p-5 text-emerald-400 font-mono text-xs md:text-sm h-56 overflow-y-auto whitespace-pre-wrap break-all leading-relaxed">
                        > 準備完了。デプロイ待機中...
                    </div>
                </div>
            </div>
        </div>

        <!-- タブ: 設定 -->
        <div id="tab-settings" class="tab-content flex-col h-full p-4 md:p-8 overflow-y-auto max-w-4xl mx-auto w-full">
            <h2 class="text-2xl md:text-3xl font-extrabold mb-6 text-slate-800 tracking-tight">⚙️ 環境設定</h2>
            <div class="space-y-6 pb-12">
                
                <div class="bg-white p-6 md:p-8 rounded-2xl shadow-md border border-slate-100 transition-all hover:shadow-lg">
                    <h3 class="font-extrabold text-lg mb-5 text-slate-800 flex items-center gap-2"><span class="text-blue-500 text-xl">🤖</span> AI エンジン API Keys</h3>
                    <div class="space-y-5">
                        <div>
                            <label class="block mb-2 text-sm font-bold text-slate-600">Gemini API Key</label>
                            <input type="password" id="gemini-key" class="w-full border border-slate-200 bg-slate-50/50 p-3.5 rounded-xl text-base focus:ring-4 focus:ring-primary/20 focus:border-primary focus:bg-white outline-none transition-all font-mono">
                        </div>
                        <div>
                            <label class="block mb-2 text-sm font-bold text-slate-600">Claude API Key</label>
                            <input type="password" id="claude-key" class="w-full border border-slate-200 bg-slate-50/50 p-3.5 rounded-xl text-base focus:ring-4 focus:ring-primary/20 focus:border-primary focus:bg-white outline-none transition-all font-mono">
                        </div>
                        <div>
                            <label class="block mb-2 text-sm font-bold text-slate-600">OpenAI API Key (GPT)</label>
                            <input type="password" id="openai-key" class="w-full border border-slate-200 bg-slate-50/50 p-3.5 rounded-xl text-base focus:ring-4 focus:ring-primary/20 focus:border-primary focus:bg-white outline-none transition-all font-mono">
                        </div>
                    </div>
                </div>
                
                <div class="bg-white p-6 md:p-8 rounded-2xl shadow-md border border-slate-100 transition-all hover:shadow-lg">
                    <h3 class="font-extrabold text-lg mb-5 text-slate-800 flex items-center gap-2"><span class="text-orange-500 text-xl">☁️</span> Cloudflare 認証情報</h3>
                    <div class="space-y-5">
                        <div>
                            <label class="block mb-2 text-sm font-bold text-slate-600">Account ID</label>
                            <input type="text" id="cf-account-id" class="w-full border border-slate-200 bg-slate-50/50 p-3.5 rounded-xl text-base focus:ring-4 focus:ring-primary/20 focus:border-primary focus:bg-white outline-none transition-all font-mono">
                        </div>
                        <div>
                            <label class="block mb-2 text-sm font-bold text-slate-600">API Token <span class="font-normal text-slate-400 text-xs ml-1">(Edit Workers権限)</span></label>
                            <input type="password" id="cf-token" class="w-full border border-slate-200 bg-slate-50/50 p-3.5 rounded-xl text-base focus:ring-4 focus:ring-primary/20 focus:border-primary focus:bg-white outline-none transition-all font-mono">
                        </div>
                    </div>
                </div>
                
                <div class="flex flex-col md:flex-row items-center gap-4">
                    <button onclick="saveSettings()" class="w-full md:w-auto bg-gradient-to-r from-primary to-blue-600 text-white px-10 py-4 rounded-xl font-bold hover:from-blue-600 hover:to-blue-700 shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98] text-lg">設定を端末に保存</button>
                    <span id="settings-msg" class="text-green-600 font-bold hidden bg-green-50 px-4 py-2 rounded-xl border border-green-100 shadow-sm animate-pulse">✓ 保存しました</span>
                </div>

                <!-- 履歴復元セクション -->
                <div class="bg-white p-6 md:p-8 rounded-2xl shadow-md border border-slate-100 mt-8">
                    <h3 class="font-extrabold text-lg mb-5 text-slate-800 flex items-center gap-2"><span class="text-purple-500 text-xl">⏳</span> 自動バックアップ <span class="text-sm font-normal text-slate-400">(直近5件)</span></h3>
                    <ul id="backup-list" class="space-y-3"></ul>
                </div>
            </div>
        </div>

    </main>

    <!-- 【モバイル専用】ボトムナビゲーション (スマート化・固定) -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md text-slate-400 flex border-t border-slate-100 z-30 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.03)] h-[64px]">
        <button onclick="switchTab('chat')" class="flex-1 py-1.5 text-center text-[11px] font-bold flex flex-col items-center justify-center nav-btn-mobile text-primary transition-all" id="nav-mobile-chat">
            <span class="text-2xl mb-0.5 drop-shadow-sm transition-transform active:scale-90">💬</span>要件
        </button>
        <button onclick="switchTab('code')" class="flex-1 py-1.5 text-center text-[11px] font-bold flex flex-col items-center justify-center nav-btn-mobile transition-all hover:text-slate-600" id="nav-mobile-code">
            <span class="text-2xl mb-0.5 drop-shadow-sm transition-transform active:scale-90">💻</span>コード
        </button>
        <button onclick="switchTab('deploy')" class="flex-1 py-1.5 text-center text-[11px] font-bold flex flex-col items-center justify-center nav-btn-mobile transition-all hover:text-slate-600" id="nav-mobile-deploy">
            <span class="text-2xl mb-0.5 drop-shadow-sm transition-transform active:scale-90">🚀</span>デプロイ
        </button>
        <button onclick="switchTab('settings')" class="flex-1 py-1.5 text-center text-[11px] font-bold flex flex-col items-center justify-center nav-btn-mobile transition-all hover:text-slate-600" id="nav-mobile-settings">
            <span class="text-2xl mb-0.5 drop-shadow-sm transition-transform active:scale-90">⚙️</span>設定
        </button>
    </nav>

    <script>
        // === グローバル状態 ===
        let appState = {
            files: [], // {name: 'index.js', content: '...'}
            currentFileIndex: 0,
            timestamp: null,
            chatMessages: [] // 会話履歴 [{role: 'user'|'assistant', content: '...'}]
        };
        let editor;
        let saveTimeout;
        let wakeLock = null;

        // === PWA Service Worker 動的登録 ===
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'ai-worker-studio-v4';
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => self.clients.claim());
                self.addEventListener('fetch', e => {
                    e.respondWith(
                        fetch(e.request).catch(() => caches.match(e.request))
                    );
                });
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
        }

        // === AI動的Web Worker作成 ===
        const aiWorkerCode = `
        self.onmessage = async function(e) {
            const { messages, model, geminiKey, claudeKey, openaiKey, isCodeGeneration } = e.data;
            try {
                let resultText = "";
                
                if (model === 'gemini') {
                    if(!geminiKey) throw new Error("Gemini API Keyが未設定です。設定タブを確認してください。");
                    
                    const contents = messages.map(m => ({
                        role: m.role === 'user' ? 'user' : 'model',
                        parts: [{ text: m.content }]
                    }));
                    
                    const generationConfig = isCodeGeneration ? { response_mime_type: "application/json" } : {};
                    
                    const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + geminiKey, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, generationConfig })
                    });
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);
                    resultText = data.candidates[0].content.parts[0].text;
                } 
                else if (model === 'claude') {
                    if(!claudeKey) throw new Error("Claude API Keyが未設定です。設定タブを確認してください。");
                    
                    const anthropicMessages = messages.map(m => ({
                        role: m.role === 'user' ? 'user' : 'assistant',
                        content: m.content
                    }));
                    
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': claudeKey,
                            'anthropic-version': '2023-06-01',
                            'anthropic-dangerous-direct-browser-access': 'true'
                        },
                        body: JSON.stringify({
                            model: 'claude-3-5-sonnet-20240620',
                            max_tokens: 4000,
                            messages: anthropicMessages
                        })
                    });
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);
                    resultText = data.content[0].text;
                }
                else if (model === 'gpt') {
                    if(!openaiKey) throw new Error("OpenAI API Keyが未設定です。設定タブを確認してください。");
                    
                    const openaiMessages = messages.map(m => ({
                        role: m.role === 'user' ? 'user' : 'assistant',
                        content: m.content
                    }));
                    
                    const bodyPayload = {
                        model: 'gpt-3.5-turbo',
                        messages: openaiMessages
                    };
                    if(isCodeGeneration) {
                        bodyPayload.response_format = { type: "json_object" };
                    }
                    
                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + openaiKey
                        },
                        body: JSON.stringify(bodyPayload)
                    });
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);
                    resultText = data.choices[0].message.content;
                }

                self.postMessage({ success: true, data: resultText, isCodeGeneration });
            } catch (err) {
                self.postMessage({ success: false, error: err.message, isCodeGeneration });
            }
        };`;
        const aiWorkerBlob = new Blob([aiWorkerCode], { type: 'application/javascript' });
        const aiWorker = new Worker(URL.createObjectURL(aiWorkerBlob));

        // === ユーティリティ・UI制御 ===
        function showLoading(text) {
            document.getElementById('loading-text').innerText = text;
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
        }
        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('flex');
            overlay.classList.add('hidden');
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) { console.warn('WakeLock:', err.message); }
        }
        function releaseWakeLock() {
            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
        }

        // === 初期化 ===
        window.onload = async () => {
            // エディタの初期化
            editor = ace.edit("editor");
            editor.setTheme("ace/theme/monokai");
            editor.session.setMode("ace/mode/javascript");
            editor.setOptions({
                fontSize: window.innerWidth < 768 ? "13px" : "15px",
                scrollPastEnd: 0.5,
                wrap: true
            });
            
            // オートセーブ
            editor.session.on('change', () => {
                if(appState.files.length > 0) {
                    appState.files[appState.currentFileIndex].content = editor.getValue();
                    clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(saveProject, 2000); 
                }
            });

            await loadSettings();
            await loadProject();
            await updateBackupList();
            
            // UI初期化 (Chatタブ表示)
            switchTab('chat');
        };

        // === タブ切り替え ===
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            // PC Navigation Styling (Rich Update)
            document.querySelectorAll('.nav-btn-pc').forEach(el => {
                el.classList.remove('bg-slate-800/80', 'text-white', 'border-primary');
                el.classList.add('border-transparent', 'text-slate-300');
            });
            const activeNavPc = document.getElementById(`nav-${tabId}`);
            if(activeNavPc) {
                activeNavPc.classList.remove('border-transparent', 'text-slate-300');
                activeNavPc.classList.add('bg-slate-800/80', 'text-white', 'border-primary');
            }

            // Mobile Navigation Styling
            document.querySelectorAll('.nav-btn-mobile').forEach(el => {
                el.classList.remove('text-primary');
                el.classList.add('text-slate-400');
            });
            const activeNavMobile = document.getElementById(`nav-mobile-${tabId}`);
            if(activeNavMobile) {
                activeNavMobile.classList.remove('text-slate-400');
                activeNavMobile.classList.add('text-primary');
            }

            if (tabId === 'code') {
                updateFileList();
                setTimeout(() => editor.resize(), 50);
            } else if (tabId === 'settings') {
                updateBackupList();
            }
        }

        function toggleMobileFileList() {
            const container = document.getElementById('file-list-container');
            container.classList.toggle('hidden');
            container.classList.toggle('flex');
        }

        // === 設定管理 (IndexedDB) ===
        async function saveSettings() {
            await localforage.setItem('geminiKey', document.getElementById('gemini-key').value);
            await localforage.setItem('claudeKey', document.getElementById('claude-key').value);
            await localforage.setItem('openaiKey', document.getElementById('openai-key').value);
            
            await localforage.setItem('cfAccountId', document.getElementById('cf-account-id').value);
            await localforage.setItem('cfToken', document.getElementById('cf-token').value);
            await localforage.setItem('workerName', document.getElementById('worker-name').value);
            
            const msg = document.getElementById('settings-msg');
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 2000);
        }

        async function loadSettings() {
            document.getElementById('gemini-key').value = await localforage.getItem('geminiKey') || '';
            document.getElementById('claude-key').value = await localforage.getItem('claudeKey') || '';
            document.getElementById('openai-key').value = await localforage.getItem('openaiKey') || '';
            
            document.getElementById('cf-account-id').value = await localforage.getItem('cfAccountId') || '';
            document.getElementById('cf-token').value = await localforage.getItem('cfToken') || '';
            document.getElementById('worker-name').value = await localforage.getItem('workerName') || 'my-awesome-worker';
        }

        // === プロジェクト保存・バックアップ ===
        async function saveProject() {
            appState.timestamp = Date.now();
            
            let history = await localforage.getItem('appState_history') || [];
            if(history.length === 0 || JSON.stringify(history[0].files) !== JSON.stringify(appState.files) || JSON.stringify(history[0].chatMessages) !== JSON.stringify(appState.chatMessages)) {
                history.unshift(JSON.parse(JSON.stringify(appState)));
                if(history.length > 5) history.pop();
                await localforage.setItem('appState_history', history);
            }

            await localforage.setItem('appState', appState);
            const now = new Date();
            document.querySelectorAll('.save-status-text').forEach(el => {
                el.innerText = `保存済 (${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')})`;
            });
            if(document.getElementById('tab-settings').classList.contains('active')) updateBackupList();
        }

        async function loadProject() {
            const saved = await localforage.getItem('appState');
            if(saved) {
                appState = {
                    files: saved.files || [],
                    currentFileIndex: saved.currentFileIndex || 0,
                    timestamp: saved.timestamp || null,
                    chatMessages: saved.chatMessages || []
                };
                if(appState.files.length > 0) loadFileIntoEditor(appState.currentFileIndex);
            }
            renderChatHistory();
        }

        async function updateBackupList() {
            const history = await localforage.getItem('appState_history') || [];
            const list = document.getElementById('backup-list');
            list.innerHTML = '';
            if(history.length === 0) {
                list.innerHTML = '<li class="text-sm text-slate-400 p-2">バックアップはありません</li>';
                return;
            }
            history.forEach((state, idx) => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-slate-50 p-3.5 border border-slate-100 rounded-xl text-sm shadow-sm transition-all hover:shadow";
                const timeStr = new Date(state.timestamp).toLocaleString();
                li.innerHTML = `<span class="font-medium text-slate-600">${timeStr} <span class="text-slate-400 font-normal ml-1">(${state.files.length}ファイル)</span></span> 
                                <button onclick="restoreBackup(${idx})" class="bg-white border border-slate-200 text-blue-600 px-4 py-1.5 rounded-lg hover:bg-blue-50 font-bold shadow-sm transition-all active:scale-95 text-xs">復元</button>`;
                list.appendChild(li);
            });
        }

        async function restoreBackup(index) {
            if(!confirm("現在の状態は上書きされます。復元しますか？")) return;
            const history = await localforage.getItem('appState_history') || [];
            if(history[index]) {
                appState = history[index];
                await saveProject(); 
                if(appState.files.length > 0) loadFileIntoEditor(appState.currentFileIndex);
                renderChatHistory();
                updateFileList();
                alert("復元しました。");
            }
        }

        // === APIキー 検証 ===
        async function getApiKeys() {
            return {
                geminiKey: await localforage.getItem('geminiKey'),
                claudeKey: await localforage.getItem('claudeKey'),
                openaiKey: await localforage.getItem('openaiKey')
            };
        }
        
        async function checkApiKeys() {
            const model = document.getElementById('ai-model').value;
            const keys = await getApiKeys();
            if(model === 'gemini' && !keys.geminiKey) { alert("Gemini API Keyを設定してください。"); switchTab('settings'); return false; }
            if(model === 'claude' && !keys.claudeKey) { alert("Claude API Keyを設定してください。"); switchTab('settings'); return false; }
            if(model === 'gpt' && !keys.openaiKey) { alert("OpenAI API Keyを設定してください。"); switchTab('settings'); return false; }
            return true;
        }

        // === チャット (要件定義フェーズ) ===
        async function sendChatMessage() {
            const inputEl = document.getElementById('chat-input');
            const input = inputEl.value.trim();
            if(!input) return;

            if(!(await checkApiKeys())) return;

            appState.chatMessages.push({ role: 'user', content: input });
            appendChatUI("あなた", input);
            inputEl.value = "";
            
            // API送信用配列（要件定義を深める指示を付与）
            const messagesForAPI = [...appState.chatMessages];
            const chatPrompt = `\n\n(指示: コードを生成するのではなく、これまでの会話内容を理解し、要件定義を深めるための次の発言・質問をしてください。回答は簡潔にお願いします。)`;
            messagesForAPI[messagesForAPI.length - 1] = { 
                role: 'user', 
                content: messagesForAPI[messagesForAPI.length - 1].content + chatPrompt 
            };

            showLoading("AIが思考中...");
            await requestWakeLock();

            const model = document.getElementById('ai-model').value;
            const keys = await getApiKeys();

            aiWorker.onmessage = async function(e) {
                hideLoading();
                releaseWakeLock();
                if(e.data.success && !e.data.isCodeGeneration) {
                    const reply = e.data.data;
                    appState.chatMessages.push({ role: 'assistant', content: reply });
                    appendChatUI("AI", reply);
                    await saveProject();
                } else if(!e.data.success) {
                    appendChatUI("エラー", "通信エラー: " + e.data.error);
                }
            };

            aiWorker.postMessage({ messages: messagesForAPI, model, ...keys, isCodeGeneration: false });
        }

        // === コード生成フェーズ ===
        async function generateCodeFromChat() {
            if(appState.chatMessages.length === 0) {
                alert("先にアイデアを入力し、送信ボタンでAIと対話を開始してください。");
                return;
            }
            if(!(await checkApiKeys())) return;

            const messagesForAPI = [...appState.chatMessages];
            const codeGenPrompt = `\n\nこれまでの会話内容の要件をすべて満たす、Cloudflare Workerのプログラムを作成してください。
必ず以下のJSON形式のみを出力してください。マークダウン（\`\`\`json など）や説明文は一切不要です。
{
  "files": [
    {"name": "index.js", "content": "ここにコード（Worker形式）"}
  ]
}`;

            const lastMsg = messagesForAPI[messagesForAPI.length - 1];
            if (lastMsg && lastMsg.role === 'user') {
                messagesForAPI[messagesForAPI.length - 1] = { role: 'user', content: lastMsg.content + codeGenPrompt };
            } else {
                messagesForAPI.push({ role: 'user', content: codeGenPrompt });
            }

            showLoading("コードを生成中...");
            await requestWakeLock();

            const model = document.getElementById('ai-model').value;
            const keys = await getApiKeys();

            aiWorker.onmessage = async function(e) {
                hideLoading();
                releaseWakeLock();
                if(e.data.success && e.data.isCodeGeneration) {
                    try {
                        let cleanJson = e.data.data.replace(/^```json/i, '').replace(/^```/i, '').replace(/```$/i, '').trim();
                        const parsed = JSON.parse(cleanJson);
                        if(!parsed.files || !Array.isArray(parsed.files)) throw new Error("不正なフォーマット");
                        
                        appState.files = parsed.files;
                        appState.currentFileIndex = 0;
                        
                        const successMsg = "コードの生成が完了しました！「コード編集」タブを開いて確認してください。";
                        appendChatUI("AI", successMsg);
                        appState.chatMessages.push({ role: 'assistant', content: successMsg });
                        
                        await saveProject(); 
                        switchTab('code');
                    } catch(err) {
                        console.error(err, e.data.data);
                        appendChatUI("エラー", "生成データの解析に失敗しました。もう一度生成ボタンを押してください。");
                    }
                } else if(!e.data.success) {
                    appendChatUI("エラー", "生成に失敗しました: " + e.data.error);
                }
            };

            aiWorker.postMessage({ messages: messagesForAPI, model, ...keys, isCodeGeneration: true });
        }

        // === チャットUI ===
        function renderChatHistory() {
            const historyEl = document.getElementById('chat-history');
            historyEl.innerHTML = `
                <div class="bg-white border border-slate-200 p-5 rounded-2xl rounded-tl-sm max-w-[90%] md:max-w-2xl self-start shadow-md text-sm text-slate-700 leading-relaxed font-medium">
                    <span class="text-xl mb-1 block">👋</span> Cloudflare Workerで作りたいAPIやアプリのアイデアを教えてください。<br><br>
                    対話して要件を整理した後、下の<b class="text-emerald-600">「⚡️ 要件からコードを生成する」</b>ボタンを押すと、自動でプログラムが組まれます。
                </div>`;
            appState.chatMessages.forEach(msg => {
                appendChatUI(msg.role === 'user' ? 'あなた' : 'AI', msg.content);
            });
            historyEl.scrollTop = historyEl.scrollHeight;
        }

        function appendChatUI(sender, message) {
            const history = document.getElementById('chat-history');
            const div = document.createElement('div');
            
            // リッチ化されたチャットバブル
            if (sender === "あなた") {
                div.className = "bg-gradient-to-br from-primary to-blue-600 text-white p-4 md:p-5 rounded-2xl rounded-tr-sm max-w-[90%] md:max-w-2xl self-end shadow-md shadow-blue-500/20 whitespace-pre-wrap text-sm leading-relaxed font-medium";
            } else if (sender === "エラー") {
                div.className = "bg-red-50 text-red-700 border border-red-200 p-4 md:p-5 rounded-2xl rounded-tl-sm max-w-[90%] md:max-w-2xl self-start shadow-md whitespace-pre-wrap text-sm leading-relaxed font-medium";
            } else {
                div.className = "bg-white border border-slate-200 text-slate-700 p-4 md:p-5 rounded-2xl rounded-tl-sm max-w-[90%] md:max-w-2xl self-start shadow-md whitespace-pre-wrap text-sm leading-relaxed font-medium";
            }
            
            div.innerText = message;
            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
        }

        async function clearChat() {
            if(confirm("会話履歴をクリアしますか？")) {
                appState.chatMessages = [];
                renderChatHistory();
                await saveProject();
            }
        }

        // === ファイル・エディタ管理 ===
        function updateFileList() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            appState.files.forEach((file, index) => {
                const li = document.createElement('li');
                const isActive = index === appState.currentFileIndex;
                li.className = `p-3.5 rounded-xl cursor-pointer text-sm truncate transition-all duration-200 border-l-4 ${isActive ? 'bg-blue-50/80 font-bold border-primary text-primary shadow-sm' : 'border-transparent text-slate-600 hover:bg-slate-100 hover:text-slate-800'}`;
                li.innerHTML = `<span class="mr-2 opacity-70">📄</span>${file.name}`;
                li.onclick = () => loadFileIntoEditor(index);
                list.appendChild(li);
            });
        }

        function loadFileIntoEditor(index) {
            if(!appState.files[index]) return;
            appState.currentFileIndex = index;
            editor.setValue(appState.files[index].content, -1);
            
            document.getElementById('mobile-current-file').innerText = appState.files[index].name;

            const ext = appState.files[index].name.split('.').pop();
            if(ext === 'json') editor.session.setMode("ace/mode/json");
            else if(ext === 'html') editor.session.setMode("ace/mode/html");
            else editor.session.setMode("ace/mode/javascript");
            
            updateFileList();

            if(window.innerWidth < 768) {
                const container = document.getElementById('file-list-container');
                if(!container.classList.contains('hidden')) toggleMobileFileList();
            }
        }

        // === デプロイ ===
        async function deployToCloudflare() {
            const accountId = document.getElementById('cf-account-id').value;
            const token = document.getElementById('cf-token').value;
            let workerName = document.getElementById('worker-name').value || 'my-awesome-worker';
            const logEl = document.getElementById('deploy-log');

            if(!accountId || !token) {
                alert("設定タブでCloudflareのAccount ID, API Tokenを設定してください。");
                switchTab('settings');
                return;
            }

            const mainFile = appState.files.find(f => f.name === 'index.js' || f.name === 'worker.js');
            if(!mainFile) {
                logEl.innerText = "> [エラー] デプロイには 'index.js' または 'worker.js' が必要です。";
                return;
            }

            logEl.innerText = `> [${new Date().toLocaleTimeString()}] デプロイ開始: ${workerName}...\n`;
            showLoading("デプロイ中...");
            await requestWakeLock();

            try {
                const url = `https://api.cloudflare.com/client/v4/accounts/${accountId}/workers/scripts/${workerName}`;
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/javascript'
                    },
                    body: mainFile.content
                });

                const result = await response.json();
                
                if(result.success) {
                    logEl.innerText += `> [成功] デプロイ完了！🚀\n`;
                    logEl.innerText += `> 👉 https://${workerName}.<your-subdomain>.workers.dev\n`;
                } else {
                    logEl.innerText += `> [エラー] ${JSON.stringify(result.errors, null, 2)}\n`;
                }
            } catch (err) {
                logEl.innerText += `> [ネットワークエラー] ${err.message}\n`;
            } finally {
                hideLoading();
                releaseWakeLock();
            }
        }

        // === ZIP エクスポート ===
        async function exportProject() {
            if(appState.files.length === 0) return alert("エクスポートするファイルがありません。");
            
            const zip = new JSZip();
            appState.files.forEach(file => {
                zip.file(file.name, file.content);
            });
            
            zip.file("project_meta.json", JSON.stringify({
                workerName: document.getElementById('worker-name').value,
                timestamp: Date.now(),
                chatMessages: appState.chatMessages
            }));

            const content = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(content);
            a.download = `${document.getElementById('worker-name').value || 'aws-project'}.zip`;
            a.click();
        }

        // === ZIP インポート ===
        async function importProject(event) {
            const file = event.target.files[0];
            if(!file) return;

            try {
                const zip = await JSZip.loadAsync(file);
                appState.files = [];
                
                for (let filename of Object.keys(zip.files)) {
                    const fileData = zip.files[filename];
                    if(!fileData.dir) {
                        const content = await fileData.async("string");
                        if(filename === "project_meta.json") {
                            const meta = JSON.parse(content);
                            if(meta.workerName) document.getElementById('worker-name').value = meta.workerName;
                            if(meta.chatMessages) appState.chatMessages = meta.chatMessages;
                        } else {
                            appState.files.push({ name: filename, content: content });
                        }
                    }
                }
                
                appState.currentFileIndex = 0;
                await saveProject();
                renderChatHistory();
                switchTab('code');
                alert("インポートが完了しました。");
            } catch(err) {
                alert("ZIPの読み込みに失敗しました: " + err.message);
            }
            event.target.value = '';
        }
    </script>
